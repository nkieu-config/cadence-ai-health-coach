name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# GITHUB_TOKEN ได้แค่สิทธิ์อ่าน — workflow นี้ไม่เขียนอะไรกลับเข้า repo
permissions:
  contents: read

# push ใหม่บน branch เดิม → ยกเลิกรอบเก่า ไม่ต้องรอคิว
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  # เปิดแอปจริงทุกหน้า × มือถือ/เดสก์ท็อป × light/dark
  # รันเฉพาะ routes.spec (read-only) — ไม่แตะข้อมูลของปาล์ม
  # เทสต์ที่เขียนข้อมูล (checkin.spec) รันบนเครื่องตัวเองด้วย `npm run e2e`
  e2e:
    name: e2e (เปิดแอปจริง)
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
      DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}

    steps:
      - name: ยังไม่ได้ตั้ง secrets — ข้าม e2e
        if: env.NEXT_PUBLIC_SUPABASE_URL == ''
        run: echo "::notice title=ข้าม e2e::ตั้ง secrets SUPABASE_URL / SUPABASE_ANON_KEY / DEMO_EMAIL / DEMO_PASSWORD ใน repo settings แล้วงานนี้จะเริ่มทำงานเอง"

      - uses: actions/checkout@v4
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''

      - uses: actions/setup-node@v4
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''

      - name: ติดตั้งเบราว์เซอร์
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        run: npx playwright install --with-deps chromium

      - name: Build
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        run: npm run build

      - name: E2E (read-only)
        if: env.NEXT_PUBLIC_SUPABASE_URL != ''
        run: npx playwright test e2e/routes.spec.ts

      - uses: actions/upload-artifact@v4
        if: failure() && env.NEXT_PUBLIC_SUPABASE_URL != ''
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
